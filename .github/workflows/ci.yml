name: CI

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      head_sha:
        description: 'PR head SHA to test (for bot-created PRs that bypass the pull_request trigger)'
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.head_sha || github.event.pull_request.head.sha || github.ref }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          outputs: type=docker,dest=/tmp/image.tar
          tags: ai-engkit:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: image
          path: /tmp/image.tar
          retention-days: 7

  test:
    name: Integration Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Start services
        run: |
          cat > docker-compose.override.yml << 'EOF'
          services:
            ai-dev:
              image: ai-engkit:ci
              container_name: ci-test
              environment:
                - OPENCODE_PLUGINS=oh-my-openagent,superpowers@git+https://github.com/obra/superpowers.git
              volumes:
                - workspace-dev:/home/devuser/workspace
                - opencode-data-dev:/home/devuser/.local/share/opencode
                - opencode-config-dev:/home/devuser/.config/opencode
                - openchamber-data-dev:/home/devuser/.config/openchamber
                - ssh-keys-dev:/home/devuser/.ssh
                - git-config-dev:/home/devuser/.config/git
                - /var/run/docker.sock:/var/run/docker.sock
          EOF
          docker compose -f docker-compose.dev.yml -f docker-compose.override.yml up -d
          echo "Waiting for services..."
          sleep 60

      - name: Run tests
        run: |
          chmod +x test/run-tests.sh
          ./test/run-tests.sh ci-test

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.dev.yml logs ci-test || true
          docker compose -f docker-compose.dev.yml ps || true

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v --remove-orphans || true

  scan:
    name: Vulnerability Scan
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Run Grype vulnerability scan
        uses: anchore/scan-action@v7
        with:
          image: "ai-engkit:ci"
          output-format: sarif
          output-file: grype-results.sarif
          severity-cutoff: critical
          fail-build: false

      - name: Upload Grype results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: grype-results.sarif
          category: sca-grype

  push:
    name: Push to GHCR
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        run: |
          IMAGE="${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}"
          docker tag ai-engkit:ci "${IMAGE}:${{ github.ref_name }}"
          docker tag ai-engkit:ci "${IMAGE}:sha-${{ github.sha }}"
          docker tag ai-engkit:ci "${IMAGE}:latest"
          docker push --all-tags "${IMAGE}"

  release:
    name: Create Release
    needs: [push, test, scan]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate Release Body
        id: body
        run: |
          CURRENT_TAG="${{ github.ref_name }}"

          PREV_TAG=$(git tag --sort=-version:refname | \
            grep -vE '(rc|beta|alpha|dev|test|pre)' | \
            grep -v "^${CURRENT_TAG}$" | \
            head -1 || true)

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-merges | head -50)
            SINCE_TAG="first release"
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges | head -50)
            SINCE_TAG="${PREV_TAG}"
          fi

          {
            echo 'body<<RELEASE_BODY_EOF'
            echo '## Docker Image'
            echo ''
            echo '```bash'
            echo "docker pull ghcr.io/${GITHUB_REPOSITORY,,}:${{ github.ref_name }}"
            echo '```'
            echo ''
            echo '## Quick Start'
            echo ''
            echo '```bash'
            echo 'cp .env.example .env'
            echo 'docker compose up -d'
            echo '```'
            echo ''
            echo '## Changes (since '"${SINCE_TAG}"')'
            echo ''
            echo "$CHANGELOG"
            echo ''
            echo '## Test Results'
            echo ''
            echo '| Job | Status |'
            echo '|-----|--------|'
            echo '| Integration Tests | ✅ Passed |'
            echo '| Vulnerability Scan | ⚠️ Report Available |'
            echo ''
            echo '---'
            echo '*Generated by GitHub Actions*'
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.body.outputs.body }}

  auto-tag:
    name: Auto Tag Dependency Updates
    needs: [test, scan]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (contains(github.event.head_commit.message, 'chore: update Dockerfile pinned versions') ||
       contains(github.event.head_commit.message, 'chore: dependency update release') ||
       contains(github.event.head_commit.message, 'dependency version update'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Calculate PATCH version
        id: version
        run: |
          set -euo pipefail
          LATEST_TAG=$(git tag --sort=-version:refname | \
            grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | \
            grep -vE '(rc|beta|alpha|dev|test|pre)' | \
            head -1 || echo "v0.0.0")
          CHANGELOG_VERSION=""
          if [[ -f docs/CHANGELOG.md ]]; then
            CHANGELOG_VERSION=$(grep -m1 -oP '^## \[\K[0-9]+\.[0-9]+\.[0-9]+(?=\] - )' docs/CHANGELOG.md || true)
          fi
          echo "latest-tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          NEXT_PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | awk -F. '{$NF = $NF + 1;} 1' OFS='.')
          NEXT_VERSION="v${NEXT_PATCH}"
          if [[ -n "$CHANGELOG_VERSION" ]]; then
            CHANGELOG_TAG="v${CHANGELOG_VERSION}"
            HIGHER_VERSION=$(printf '%s\n%s\n' "$LATEST_TAG" "$CHANGELOG_TAG" | sort -V | tail -n1)
            if [[ "$HIGHER_VERSION" == "$CHANGELOG_TAG" && "$CHANGELOG_TAG" != "$LATEST_TAG" ]]; then
              NEXT_VERSION="$CHANGELOG_TAG"
            fi
          fi
          echo "next-version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "::notice::Version bump: $LATEST_TAG -> ${NEXT_VERSION}"

      - name: Create and push tag
        env:
          GIT_TERMINAL_PROMPT: "0"
        run: |
          set -euo pipefail
          NEXT_VERSION="${{ steps.version.outputs.next-version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT_VERSION" -m "Release $NEXT_VERSION — dependency updates"
          git push origin "$NEXT_VERSION"
          echo "::notice::Created and pushed tag: $NEXT_VERSION"

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        run: |
          IMAGE="${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}"
          NEXT_VERSION="${{ steps.version.outputs.next-version }}"
          docker tag ai-engkit:ci "${IMAGE}:${NEXT_VERSION}"
          docker tag ai-engkit:ci "${IMAGE}:sha-${{ github.sha }}"
          docker tag ai-engkit:ci "${IMAGE}:latest"
          docker push --all-tags "${IMAGE}"
          echo "::notice::Pushed image: ${IMAGE}:${NEXT_VERSION}"

      - name: Generate Release Body
        id: body
        run: |
          set -euo pipefail
          NEXT_VERSION="${{ steps.version.outputs.next-version }}"
          PREV_TAG=$(git tag --sort=-version:refname | \
            grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | \
            grep -vE '(rc|beta|alpha|dev|test|pre)' | \
            grep -v "^${NEXT_VERSION}$" | \
            head -1 || true)

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-merges | head -50)
            SINCE_TAG="first release"
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges | head -50)
            SINCE_TAG="${PREV_TAG}"
          fi

          {
            echo 'body<<RELEASE_BODY_EOF'
            echo '## Docker Image'
            echo ''
            echo '```bash'
            echo "docker pull ghcr.io/${GITHUB_REPOSITORY,,}:${NEXT_VERSION}"
            echo '```'
            echo ''
            echo '## Quick Start'
            echo ''
            echo '```bash'
            echo 'cp .env.example .env'
            echo 'docker compose up -d'
            echo '```'
            echo ''
            echo '## Changes (since '"${SINCE_TAG}"')'
            echo ''
            echo "$CHANGELOG"
            echo ''
            echo '## Test Results'
            echo ''
            echo '| Job | Status |'
            echo '|-----|--------|'
            echo '| Integration Tests | ✅ Passed |'
            echo '| Vulnerability Scan | ⚠️ Report Available |'
            echo ''
            echo '---'
            echo '*Generated by GitHub Actions — auto-release on dependency update*'
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.next-version }}
          body: ${{ steps.body.outputs.body }}
