name: CI

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          outputs: type=docker,dest=/tmp/image.tar
          tags: codeforge:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image
          path: /tmp/image.tar
          retention-days: 7

  test:
    name: Integration Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Start services
        run: |
          cat > docker-compose.override.yml << 'EOF'
          services:
            ai-dev:
              image: codeforge:ci
              container_name: ci-test
              environment:
                - OPENCODE_PLUGINS=oh-my-openagent,superpowers@git+https://github.com/obra/superpowers.git
              volumes:
                - workspace-dev:/home/devuser/workspace
                - opencode-data-dev:/home/devuser/.local/share/opencode
                - opencode-config-dev:/home/devuser/.config/opencode
                - openchamber-data-dev:/home/devuser/.config/openchamber
                - ssh-keys-dev:/home/devuser/.ssh
                - git-config-dev:/home/devuser/.config/git
                - /var/run/docker.sock:/var/run/docker.sock
          EOF
          docker compose -f docker-compose.dev.yml -f docker-compose.override.yml up -d
          echo "Waiting for services..."
          sleep 60

      - name: Run tests
        run: |
          chmod +x test/run-tests.sh
          ./test/run-tests.sh ci-test

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.dev.yml logs ci-test || true
          docker compose -f docker-compose.dev.yml ps || true

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v --remove-orphans || true

  scan:
    name: Vulnerability Scan
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Run Grype vulnerability scan
        uses: anchore/scan-action@v7
        with:
          image: "codeforge:ci"
          output-format: sarif
          output-file: grype-results.sarif
          severity-cutoff: critical
          fail-build: false

      - name: Upload Grype results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: grype-results.sarif
          category: sca-grype

  push:
    name: Push to GHCR
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        run: |
          IMAGE="${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}"
          docker tag codeforge:ci "${IMAGE}:${{ github.ref_name }}"
          docker tag codeforge:ci "${IMAGE}:sha-${{ github.sha }}"
          docker tag codeforge:ci "${IMAGE}:latest"
          docker push --all-tags "${IMAGE}"

  release:
    name: Create Release
    needs: [push, test, scan]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Body
        id: body
        run: |
          CURRENT_TAG="${{ github.ref_name }}"

          PREV_TAG=$(git tag --sort=-version:refname | \
            grep -vE '(rc|beta|alpha|dev|test|pre)' | \
            grep -v "^${CURRENT_TAG}$" | \
            head -1 || true)

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-merges | head -50)
            SINCE_TAG="first release"
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges | head -50)
            SINCE_TAG="${PREV_TAG}"
          fi

          {
            echo 'body<<RELEASE_BODY_EOF'
            echo '## Docker Image'
            echo ''
            echo '```bash'
            echo "docker pull ghcr.io/${GITHUB_REPOSITORY,,}:${{ github.ref_name }}"
            echo '```'
            echo ''
            echo '## Quick Start'
            echo ''
            echo '```bash'
            echo 'cp .env.example .env'
            echo 'docker compose up -d'
            echo '```'
            echo ''
            echo '## Changes (since '"${SINCE_TAG}"')'
            echo ''
            echo "$CHANGELOG"
            echo ''
            echo '## Test Results'
            echo ''
            echo '| Job | Status |'
            echo '|-----|--------|'
            echo '| Integration Tests | ✅ Passed |'
            echo '| Vulnerability Scan | ⚠️ Report Available |'
            echo ''
            echo '---'
            echo '*Generated by GitHub Actions*'
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.body.outputs.body }}