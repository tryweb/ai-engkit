name: Dependency CI Supervisor

on:
  pull_request_target:
    types: [opened]
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pull-requests: write

jobs:
  verify-and-dispatch:
    name: Verify CI and dispatch if stuck
    if: contains(github.event.pull_request.labels.*.name, 'dependencies')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for CI to trigger naturally
        run: sleep 30

      - name: Inspect latest CI run for this PR (pull_request event)
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "Inspecting CI for PR head SHA ${HEAD_SHA}"

          # Look for pull_request-event CI runs (these may be stuck at approval gate)
          LATEST_PR=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${HEAD_SHA}&event=pull_request&per_page=20" \
            --jq '[.workflow_runs[] | select(.path == ".github/workflows/ci.yml")] | sort_by(.created_at) | last // {}')

          RUN_ID=$(echo "$LATEST_PR" | jq -r '.id // ""')
          STATUS=$(echo "$LATEST_PR" | jq -r '.status // ""')
          CONCLUSION=$(echo "$LATEST_PR" | jq -r '.conclusion // ""')

          # Also look for workflow_dispatch CI runs (these are the bypass path)
          LATEST_WD=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${HEAD_SHA}&event=workflow_dispatch&per_page=20" \
            --jq '[.workflow_runs[] | select(.path == ".github/workflows/ci.yml")] | sort_by(.created_at) | last // {}')

          WD_RUN_ID=$(echo "$LATEST_WD" | jq -r '.id // ""')
          WD_STATUS=$(echo "$LATEST_WD" | jq -r '.status // ""')
          WD_CONCLUSION=$(echo "$LATEST_WD" | jq -r '.conclusion // ""')

          echo "pull_request run: ${RUN_ID:-none} status=${STATUS:-none} conclusion=${CONCLUSION:-none}"
          echo "workflow_dispatch run: ${WD_RUN_ID:-none} status=${WD_STATUS:-none} conclusion=${WD_CONCLUSION:-none}"

          # Decision logic:
          # 1. If workflow_dispatch CI already completed with success → all good, nothing to do
          # 2. If workflow_dispatch CI is running or queued → wait for it
          # 3. If pull_request CI is stuck (action_required) and no workflow_dispatch CI is running/succeeded → intervene
          # 4. If no CI runs at all → dispatch

          NEEDS_CANCEL="false"
          NEEDS_DISPATCH="false"

          if [[ "$WD_CONCLUSION" == "success" ]]; then
            echo "::notice::workflow_dispatch CI already succeeded — PR checks should be satisfied"
            NEEDS_DISPATCH="false"
          elif [[ "$WD_STATUS" == "in_progress" || "$WD_STATUS" == "queued" || "$WD_STATUS" == "pending" ]]; then
            echo "::notice::workflow_dispatch CI already running — letting it complete"
            NEEDS_DISPATCH="false"
          elif [[ "$STATUS" == "completed" && "$CONCLUSION" == "action_required" ]]; then
            echo "::warning::pull_request CI run ${RUN_ID} is stuck at approval gate — will cancel and dispatch"
            NEEDS_CANCEL="true"
            NEEDS_DISPATCH="true"
          elif [[ -z "$RUN_ID" && -z "$WD_RUN_ID" ]]; then
            echo "::warning::No CI run found at all for ${HEAD_SHA} — will dispatch"
            NEEDS_DISPATCH="true"
          elif [[ "$STATUS" == "in_progress" || "$STATUS" == "queued" || "$STATUS" == "pending" ]]; then
            echo "::notice::pull_request CI is running normally — no action needed"
          else
            echo "::notice::CI state (pr=${STATUS:-none}/${CONCLUSION:-none} wd=${WD_STATUS:-none}/${WD_CONCLUSION:-none}) — no action"
          fi

          {
            echo "needs-cancel=${NEEDS_CANCEL}"
            echo "needs-dispatch=${NEEDS_DISPATCH}"
            echo "pr-run-id=${RUN_ID}"
            echo "wd-run-id=${WD_RUN_ID}"
          } >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Cancel stuck pull_request CI run
        if: steps.check.outputs.needs-cancel == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ steps.check.outputs.pr-run-id }}"
          echo "Cancelling stuck pull_request CI run ${RUN_ID}..."
          gh api -X POST "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/cancel" || true
          echo "::notice::Cancelled stuck CI run ${RUN_ID}"

      - name: Dispatch CI via workflow_dispatch
        if: steps.check.outputs.needs-dispatch == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "Dispatching CI for ${BRANCH} @ ${HEAD_SHA}..."
          gh api -X POST "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/dispatches" \
            -f "ref=${BRANCH}" \
            -f "inputs[head_sha]=${HEAD_SHA}"
          echo "::notice::CI dispatched via workflow_dispatch for ${HEAD_SHA}"

      - name: Wait for dispatched CI to start
        if: steps.check.outputs.needs-dispatch == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "Waiting for dispatched CI to appear..."
          for i in $(seq 1 30); do
            RUN=$(gh api \
              "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${HEAD_SHA}&event=workflow_dispatch&per_page=5" \
              --jq '[.workflow_runs[] | select(.path == ".github/workflows/ci.yml")] | sort_by(.created_at) | last // {}')
            RUN_ID=$(echo "$RUN" | jq -r '.id // ""')
            if [[ -n "$RUN_ID" ]]; then
              echo "::notice::Dispatched CI run ${RUN_ID} started"
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Dispatched CI did not appear within 150s — check manually"
          exit 0

      - name: Sticky comment on PR
        if: steps.check.outputs.needs-dispatch == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-supervisor
          message: |
            **Dependency CI Supervisor** detected a stuck CI run on this bot-created PR.

            The `pull_request` CI trigger requires manual approval for bot-authored PRs.
            Supervisor cancelled the stuck run and re-triggered CI via `workflow_dispatch`
            (which bypasses the approval gate).

            The dispatched CI checks should appear on this PR shortly.
            If checks remain pending, merge `main` into this branch to re-trigger.

            ---
            *Auto-dispatched by Dependency CI Supervisor*
