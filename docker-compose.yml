services:
  ai-engine:
    image: ghcr.io/tryweb/ai-engkit:latest
    container_name: ai-engkit-engine
    volumes:
      - ${WORKSPACE_PATH:-workspace}:/home/devuser/workspace
      - opencode-data:/home/devuser/.local/share/opencode
      - lean-ctx-data:/home/devuser/.local/share/lean-ctx
      - lean-ctx-state:/home/devuser/.local/state/lean-ctx
      - opencode-config:/home/devuser/.config/opencode
      - opencode-cache:/home/devuser/.cache/opencode
      - ohmyopencode-cache:/home/devuser/.cache/oh-my-opencode
      - openchamber-data:/home/devuser/.config/openchamber
      - git-config:/home/devuser/.config/git
      - ssh-keys:/home/devuser/.ssh
      - gh-config:/home/devuser/.config/gh
      - glab-config:/home/devuser/.config/glab-cli
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-devonly}
      - OPENCODE_PLUGINS=${OPENCODE_PLUGINS:-oh-my-openagent,superpowers@git+https://github.com/obra/superpowers.git}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - ai-net

  ai-ui:
    image: ghcr.io/tryweb/ai-engkit-ui:latest
    container_name: ai-engkit-ui
    depends_on:
      - ai-engine
    ports:
      - "${CHAMBER_PORT:-8000}:3000"
    volumes:
      - openchamber-data:/home/devuser/.config/openchamber
    environment:
      - OPENCODE_HOST=http://ai-engine:4095
      - OPENCODE_SKIP_START=true
      - OPENCHAMBER_UI_PASSWORD=${OPENCHAMBER_UI_PASSWORD:-chamber}
    restart: unless-stopped
    networks:
      - ai-net

networks:
  ai-net:
    driver: bridge

volumes:
  workspace:
  opencode-data:
  lean-ctx-data:
  lean-ctx-state:
  opencode-config:
  opencode-cache:
  ohmyopencode-cache:
  openchamber-data:
  git-config:
  ssh-keys:
  gh-config:
  glab-config:
