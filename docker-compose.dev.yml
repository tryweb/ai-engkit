services:
  ai-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - OH_MY_OPENAGENT_VERSION=${OH_MY_OPENAGENT_VERSION:-latest}
    container_name: ai-engkit-dev
    ports:
      - "${CHAMBER_DEV_PORT:-8001}:3000"
    volumes:
      - workspace-dev:/home/devuser/workspace
      - opencode-data-dev:/home/devuser/.local/share/opencode
      - lean-ctx-data-dev:/home/devuser/.local/share/lean-ctx
      - lean-ctx-state-dev:/home/devuser/.local/state/lean-ctx
      - opencode-config-dev:/home/devuser/.config/opencode
      - opencode-cache-dev:/home/devuser/.cache/opencode
      - ohmyopencode-cache-dev:/home/devuser/.cache/oh-my-opencode
      - openchamber-data-dev:/home/devuser/.config/openchamber
      - git-config-dev:/home/devuser/.config/git
      - ssh-keys-dev:/home/devuser/.ssh
      - gh-config-dev:/home/devuser/.config/gh
      - glab-config-dev:/home/devuser/.config/glab-cli
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-devonly}
      - OPENCODE_PLUGINS=oh-my-openagent,superpowers@git+https://github.com/obra/superpowers.git
      - OPENCODE_PROVIDER=${OPENCODE_PROVIDER:-}
      - OPENCHAMBER_UI_PASSWORD=${OPENCHAMBER_UI_PASSWORD:-chamber}
      - OPENCHAMBER_HOST=0.0.0.0

    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  workspace-dev:
  opencode-data-dev:
  lean-ctx-data-dev:
  lean-ctx-state-dev:
  opencode-config-dev:
  opencode-cache-dev:
  ohmyopencode-cache-dev:
  openchamber-data-dev:
  git-config-dev:
  ssh-keys-dev:
  gh-config-dev:
  glab-config-dev:
